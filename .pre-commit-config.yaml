repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-added-large-files
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest coverage
        entry: uv run --locked pytest --cov=src/llm_plan_execute --cov-report=term-missing --cov-fail-under=80
        language: system
        pass_filenames: false
      - id: complexipy
        name: cognitive complexity
        entry: uv run --locked complexipy src --max-complexity-allowed 15 --failed --plain
        language: system
        pass_filenames: false
